server {
    listen 80;
    server_name www.fbtax.cloud fbtax.cloud _;
    client_max_body_size 2048M;
    root /usr/share/nginx/html;

    # Nota: /api/* é roteado direto pelo Traefik para o container api.
    # nginx aqui só serve arquivos estáticos (SPA React).

    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
