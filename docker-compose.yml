services:
  # Backend (Go)
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    expose:
      - "8086"
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-fbtax_cloud}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://www.fbtax.cloud}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/root/server", "-health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - fb_net

  # Frontend (React/Nginx) — roteamento declarado via labels Traefik
  web:
    build:
      context: ./frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # Router HTTPS
      - "traefik.http.routers.fbtax-cloud.rule=Host(`www.fbtax.cloud`) || Host(`fbtax.cloud`)"
      - "traefik.http.routers.fbtax-cloud.entrypoints=https"
      - "traefik.http.routers.fbtax-cloud.tls=true"
      - "traefik.http.routers.fbtax-cloud.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fbtax-cloud.service=fbtax-cloud"
      # Router HTTP → redireciona para HTTPS
      - "traefik.http.routers.fbtax-cloud-http.rule=Host(`www.fbtax.cloud`) || Host(`fbtax.cloud`)"
      - "traefik.http.routers.fbtax-cloud-http.entrypoints=http"
      - "traefik.http.routers.fbtax-cloud-http.middlewares=fbtax-redirect-https@docker"
      - "traefik.http.middlewares.fbtax-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.fbtax-redirect-https.redirectscheme.permanent=true"
      # Service
      - "traefik.http.services.fbtax-cloud.loadbalancer.server.port=80"
    networks:
      - fb_net
      - coolify

  # Banco de Dados
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-fbtax_cloud}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fbtax_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  fb_net:
    driver: bridge
  coolify:
    external: true

volumes:
  postgres_data:
