services:
  # Backend (Go) — Traefik roteia /api/* direto pra cá
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    expose:
      - "8086"
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-fbtax_cloud}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://www.fbtax.cloud}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - fb_net
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.fbtax-cloud-api.rule=(Host(`www.fbtax.cloud`) || Host(`fbtax.cloud`)) && PathPrefix(`/api/`)"
      - "traefik.http.routers.fbtax-cloud-api.entrypoints=https"
      - "traefik.http.routers.fbtax-cloud-api.tls=true"
      - "traefik.http.routers.fbtax-cloud-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fbtax-cloud-api.priority=10"
      - "traefik.http.services.fbtax-cloud-api.loadbalancer.server.port=8086"

  # Frontend (React/Nginx) — Traefik roteia tudo que NÃO é /api/* pra cá
  web:
    build:
      context: ./frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # Router HTTPS
      - "traefik.http.routers.fbtax-cloud.rule=Host(`www.fbtax.cloud`) || Host(`fbtax.cloud`)"
      - "traefik.http.routers.fbtax-cloud.entrypoints=https"
      - "traefik.http.routers.fbtax-cloud.tls=true"
      - "traefik.http.routers.fbtax-cloud.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fbtax-cloud.service=fbtax-cloud"
      - "traefik.http.routers.fbtax-cloud.priority=1"
      # Router HTTP → redireciona para HTTPS
      - "traefik.http.routers.fbtax-cloud-http.rule=Host(`www.fbtax.cloud`) || Host(`fbtax.cloud`)"
      - "traefik.http.routers.fbtax-cloud-http.entrypoints=http"
      - "traefik.http.routers.fbtax-cloud-http.middlewares=fbtax-redirect-https@docker"
      - "traefik.http.middlewares.fbtax-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.fbtax-redirect-https.redirectscheme.permanent=true"
      # Service
      - "traefik.http.services.fbtax-cloud.loadbalancer.server.port=80"
    networks:
      - fb_net
      - coolify

  # Banco de Dados
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-fbtax_cloud}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cria a database se não existir (POSTGRES_DB só roda no init do volume vazio)
  db-init:
    image: postgres:15-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGPASSWORD=${DB_PASSWORD:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_NAME=${DB_NAME:-fbtax_cloud}
    restart: "no"
    command: >
      sh -c "
        psql -h db -U $$DB_USER -tc \"SELECT 1 FROM pg_database WHERE datname = '$$DB_NAME'\" | grep -q 1 ||
        psql -h db -U $$DB_USER -c \"CREATE DATABASE \\\"$$DB_NAME\\\"\"
      "
    networks:
      - fb_net

networks:
  fb_net:
    driver: bridge
  coolify:
    external: true

volumes:
  postgres_data:
