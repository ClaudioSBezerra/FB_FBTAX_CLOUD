services:
  # Backend (Go)
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    expose:
      - "8083"
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-fbtax_cloud}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://www.fbtax.cloud}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/root/server", "-health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: 256m
    networks:
      - fb_net

  # Frontend (React/Nginx) — proxy gerenciado pelo Coolify via UI
  web:
    build:
      context: ./frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    networks:
      - fb_net

  # Banco de Dados
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-fbtax_cloud}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fbtax_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m

networks:
  fb_net:
    driver: bridge

volumes:
  postgres_data:
