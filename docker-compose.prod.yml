services:
  # Backend (Go) - Production
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fbtax-cloud-api
    restart: always
    expose:
      - "8083"
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://www.fbtax.cloud}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fb_net

  # Frontend (React/Nginx) - Production
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fbtax-cloud-web
    restart: always
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.fbtax-cloud.rule=Host(`www.fbtax.cloud`)"
      - "traefik.http.routers.fbtax-cloud.entrypoints=https"
      - "traefik.http.routers.fbtax-cloud.tls=true"
      - "traefik.http.routers.fbtax-cloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.fbtax-cloud.loadbalancer.server.port=80"
    depends_on:
      - api
    networks:
      - fb_net
      - coolify

  # Banco de Dados - Production
  db:
    image: postgres:15-alpine
    container_name: fbtax-cloud-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  fb_net:
    driver: bridge
  coolify:
    external: true

volumes:
  postgres_data:
    driver: local
